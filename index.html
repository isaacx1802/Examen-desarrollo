    </div> <!-- Cierre de .app -->

<script>
// --- CONFIGURACIÓN DE ELEMENTOS ---
const loginSection = document.querySelector('.login');
const headerElement = document.querySelector('.header');
const tabsElement = document.querySelector('.tabs');
const categoriesElement = document.querySelector('.categories');
const productsSection = document.querySelector('.products');
const historySection = document.querySelector('.history');

const loginBtn = document.querySelector('.btn');
const emailInput = document.querySelector('.input-group input[type="email"]');
const passwordInput = document.querySelector('.input-group input[type="password"]');
const forgotPasswordLink = document.querySelector('.extra a');

const tabs = document.querySelectorAll('.tab');
const categories = document.querySelectorAll('.category');
const addButtons = document.querySelectorAll('.add-btn');

// --- ESTADO DE LA APLICACIÓN ---
let ventasHoy = 0;
let transacciones = 0;

// Ocultar la app principal al inicio (Solo se ve el login)
headerElement.style.display = 'none';
tabsElement.style.display = 'none';
categoriesElement.style.display = 'none';
productsSection.style.display = 'none';
historySection.style.display = 'none';

// --- 1. SCRIPT DE INICIO DE SESIÓN ---
loginBtn.addEventListener('click', (e) => {
    e.preventDefault();
    
    // Validación básica (puedes cambiar las credenciales aquí)
    if (emailInput.value.trim() === 'admin@rogerymari.com' && passwordInput.value === '123456') {
        alert('¡Bienvenido al sistema!');
        
        // Transición de pantallas
        loginSection.style.display = 'none';
        headerElement.style.display = 'block';
        tabsElement.style.display = 'flex';
        categoriesElement.style.display = 'flex';
        productsSection.style.display = 'block';
    } else {
        alert('Correo o contraseña incorrectos. Usa admin@rogerymari.com y 123456');
    }
});

// Recuperar contraseña
forgotPasswordLink.addEventListener('click', (e) => {
    e.preventDefault();
    const email = prompt('Por favor, ingresa tu correo electrónico para enviarte un enlace de recuperación:');
    if (email) {
        alert(`Se ha enviado un correo de recuperación a: ${email}`);
    }
});

// --- 2. SCRIPT DE NAVEGACIÓN (TABS) ---
tabs.forEach((tab, index) => {
    tab.addEventListener('click', () => {
        // Cambiar pestaña activa de forma visual
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        // Alternar vistas entre Punto de Venta e Historial
        if (index === 0) { // Punto de Venta
            categoriesElement.style.display = 'flex';
            productsSection.style.display = 'block';
            historySection.style.display = 'none';
        } else { // Historial
            categoriesElement.style.display = 'none';
            productsSection.style.display = 'none';
            historySection.style.display = 'block';
        }
    });
});

// --- 3. SCRIPT DE FILTRADO POR CATEGORÍAS ---
categories.forEach(category => {
    category.addEventListener('click', () => {
        categories.forEach(c => c.classList.remove('active'));
        category.classList.add('active');

        const categoriaSeleccionada = category.textContent.trim().toLowerCase();
        const cards = document.querySelectorAll('.card');

        cards.forEach(card => {
            const nombreProducto = card.querySelector('h3').textContent.trim().toLowerCase();
            
            // Lógica de filtrado simple basada en texto
            if (categoriaSeleccionada === 'todos') {
                card.style.display = 'block';
            } else if (categoriaSeleccionada === 'frutas' && nombreProducto.includes('fresas')) {
                card.style.display = 'block';
            } else if (categoriaSeleccionada === 'helados' && nombreProducto.includes('helado')) {
                card.style.display = 'block';
            } else if (categoriaSeleccionada === 'batidos' && nombreProducto.includes('batido')) {
                card.style.display = 'block';
            } else if (categoriaSeleccionada === 'queques' && nombreProducto.includes('queque')) {
                card.style.display = 'block';
            } else {
                card.style.display = 'none';
            }
        });
    });
});

// --- 4. SCRIPT DE COMPRAS Y ACTUALIZACIÓN DE HISTORIAL ---
// Mapeo automático de los botones "Agregar" actuales
addButtons.forEach(button => {
    button.addEventListener('click', (e) => {
        const card = e.target.closest('.card');
        const nombre = card.querySelector('h3').textContent;
        const textoPrecio = card.querySelector('.price').textContent;
        
        // Extraer el número del texto "₡2 500" -> 2500
        const precio = parseInt(textoPrecio.replace(/[^\d]/g, ''), 10);

        // Confirmación de la venta
        const seguro = confirm(`¿Deseas registrar la venta de: ${nombre} por ${textoPrecio}?`);
        
        if (seguro) {
            // Actualizar variables globales de control numérico
            ventasHoy += precio;
            transacciones += 1;
            
            // Calcular el ticket promedio
            const promedio = Math.round(ventasHoy / transacciones);

            // Actualizar la interfaz del Historial en pantalla
            const boxes = document.querySelectorAll('.box');
            
            // Box 1: Ventas de Hoy
            boxes[0].querySelector('.money').textContent = `₡${ventasHoy.toLocaleString('es-CR')}`;
            boxes[0].querySelector('.small').textContent = `${transacciones} transacción${transacciones > 1 ? 'es' : ''}`;
            
            // Box 2: Total General (Para este examen simula el acumulado de hoy)
            boxes[1].querySelector('.money').textContent = `₡${ventasHoy.toLocaleString('es-CR')}`;
            boxes[1].querySelector('.small').textContent = `${transacciones} venta${transacciones > 1 ? 's' : ''} totale${transacciones > 1 ? 's' : 's'}`;
            
            // Box 3: Promedio por Venta
            boxes[2].querySelector('.money').textContent = `₡${promedio.toLocaleString('es-CR')}`;

            alert(`¡Venta registrada con éxito!\nProducto: ${nombre}`);
        }
    });
});
</script>

</body>
</html>
